<html>
<head>
    <title>snek</title>
    <link rel="stylesheet" href="./snek.css"> 
</head>
<body>
    <div class="matrixwrap"><canvas id="matrixcanvas"></canvas></div>
    <div class="container noselect">
        <div class="wrapper">
            <button id="replay">
                <svg class="svg-inline--fa" aria-hidden="true" focusable="false" data-prefix="fas"
                    data-icon="play" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"
                    data-fa-i2svg="">
                    <path fill="currentColor"
                        d="M424.4 214.7L72.4 6.6C43.8-10.3 0 6.1 0 47.9V464c0 37.5 40.7 60.1 72.4 41.3l352-208c31.4-18.5 31.5-64.1 0-82.6z">
                    </path>
                </svg>
                RESTART
            </button>
            <div id="canvas"></div>
            <div id="ui">
                <h2>SCORE
                </h2>
                <span id="score">000</span>
            </div>
        </div>
        <div id="author">
            <h1>Serpent</h1><span>of the Null Grid</span>
        </div>
    </div>

<!-- 
Long before screens blinked alive in early computer labs, there was said to be a plane of perfect darkness: 
a boundless grid where lines ran straight until they frayed into the void. From this silence crawled a 
creature that should not have possessed hunger, yet did - an angular, stuttering serpent formed not of 
flesh but of coordinates, each segment a point of geometry that pulsed like a dying star.

It was known only as The Line That Remembers.

People who studied the grid claimed that the serpent grew whenever it fed on the drifting sigils that 
appeared spontaneously - shimmering squares of meaningless data, each one containing some fragment of 
the universe's original equation. When consumed, the serpent did not digest them in any natural sense; 
rather, the new segment was woven directly into its being, extending its form and displacing what little 
sanity clung to the grid.

But the serpent’s growth was never triumph. At each feeding, its own body became another wall in its 
tightening prison. To exist was to elongate, and to elongate was to limit. With every morsel devoured, 
the creature's path through the darkness narrowed, until its writhing became frantic, its turns sharper, 
its confinement inevitable.

Those who watched too closely reported hearing faint static—whispers like corrupted machine code—speaking
of the serpent's dread realisation:
The only end to its hunger was its own inevitable collision.

And when that collision finally came - when the head of the wriggling geometry struck its own trailing 
tail—the grid screamed. Not loudly, but as a distortion, a glitch that ran backward through the plane, 
erasing the serpent, the sigils, and the watchers themselves, leaving only the black, empty surface.

After the scream, the grid reset.

A new serpent appeared.
Smaller. Hungry. Unaware.
The cycle continued.
As it must.
As it always had. 
-->

    <script>
        let dom_replay = document.querySelector("#replay");
        let dom_score = document.querySelector("#score");
        let dom_canvas = document.createElement("canvas");
        document.querySelector("#canvas").appendChild(dom_canvas);
        let CTX = dom_canvas.getContext("2d");

        const W = dom_canvas.width = 400;
        const H = dom_canvas.height = 400;

        let snake,
            food,
            currentHue,
            cells = 20,
            cellSize,
            isGameOver = false,
            tails = [],
            score = 0,
            maxScore = window.localStorage.getItem("maxScore") || undefined,
            particles = [],
            splashingParticleCount = 20,
            cellsCount,
            requestID;

        let helpers = {
            Vec: class {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                }
                add(v) {
                    this.x += v.x;
                    this.y += v.y;
                    return this;
                }
                mult(v) {
                    if (v instanceof helpers.Vec) {
                        this.x *= v.x;
                        this.y *= v.y;
                        return this;
                    } else {
                        this.x *= v;
                        this.y *= v;
                        return this;
                    }
                }
            },

            isCollision(v1, v2) {
                return v1.x == v2.x && v1.y == v2.y;
            },
            garbageCollector() {
                for (let i = 0; i < particles.length; i++) {
                    if (particles[i].size <= 0) {
                        particles.splice(i, 1);
                    }
                } 
            },
            drawGrid() {
                CTX.lineWidth = 1.1;
                CTX.strokeStyle = "#232332";
                CTX.shadowBlur = 0;
                for (let i = 1; i < cells; i++) {
                    let f = W / cells * i;
                    CTX.beginPath();
                    CTX.moveTo(f, 0);
                    CTX.lineTo(f, H);
                    CTX.stroke();
                    CTX.beginPath();
                    CTX.moveTo(0, f);
                    CTX.lineTo(W, f);
                    CTX.stroke();
                    CTX.closePath();
                } 
            },
            randHue() {
                return ~~(Math.random() * 360);
            },
            hsl2rgb(hue, saturation, lightness) {
                if (hue == undefined) {
                    return [0, 0, 0];
                }
                var chroma = (1 - Math.abs(2 * lightness - 1)) * saturation;
                var huePrime = hue / 60;
                var secondComponent = chroma * (1 - Math.abs(huePrime % 2 - 1));

                huePrime = ~~huePrime;
                var red;
                var green;
                var blue;

                if (huePrime === 0) {
                    red = chroma;
                    green = secondComponent;
                    blue = 0;
                } else if (huePrime === 1) {
                    red = secondComponent;
                    green = chroma;
                    blue = 0;
                } else if (huePrime === 2) {
                    red = 0;
                    green = chroma;
                    blue = secondComponent;
                } else if (huePrime === 3) {
                    red = 0;
                    green = secondComponent;
                    blue = chroma;
                } else if (huePrime === 4) {
                    red = secondComponent;
                    green = 0;
                    blue = chroma;
                } else if (huePrime === 5) {
                    red = chroma;
                    green = 0;
                    blue = secondComponent;
                }

                var lightnessAdjustment = lightness - chroma / 2;
                red += lightnessAdjustment;
                green += lightnessAdjustment;
                blue += lightnessAdjustment;

                return [
                    Math.round(red * 255),
                    Math.round(green * 255),
                    Math.round(blue * 255)];

            },
            lerp(start, end, t) {
                return start * (1 - t) + end * t;
            }
        };

        let KEY = {
            ArrowUp: false,
            ArrowRight: false,
            ArrowDown: false,
            ArrowLeft: false,
            resetState() {
                this.ArrowUp = false;
                this.ArrowRight = false;
                this.ArrowDown = false;
                this.ArrowLeft = false;
            },
            listen() {
                addEventListener(
                    "keydown",
                    e => {
                        if (e.key === "ArrowUp" && this.ArrowDown) return;
                        if (e.key === "ArrowDown" && this.ArrowUp) return;
                        if (e.key === "ArrowLeft" && this.ArrowRight) return;
                        if (e.key === "ArrowRight" && this.ArrowLeft) return;
                        this[e.key] = true;
                        Object.keys(this).
                            filter(f => f !== e.key && f !== "listen" && f !== "resetState").
                            forEach(k => {
                                this[k] = false;
                            });
                    },
                    false);
            }
        };

        class Snake {
            constructor(i, type) {
                this.pos = new helpers.Vec(W / 2, H / 2);
                this.dir = new helpers.Vec(0, 0);
                this.type = type;
                this.index = i;
                this.delay = 5;
                this.size = W / cells;
                this.color = "white";
                this.history = [];
                this.total = 1;
            }
            draw() {
                let { x, y } = this.pos;
                CTX.fillStyle = this.color;
                CTX.shadowBlur = 20;
                CTX.shadowColor = "rgba(255,255,255,.3 )";
                CTX.fillRect(x, y, this.size, this.size);
                CTX.shadowBlur = 0;
                if (this.total >= 2) {
                    for (let i = 0; i < this.history.length - 1; i++) {
                        let { x, y } = this.history[i];
                        CTX.lineWidth = 1;
                        CTX.fillStyle = "rgba(225,225,225,1)";
                        CTX.fillRect(x, y, this.size, this.size);
                    } 
                }
            }
            walls() {
                let { x, y } = this.pos;
                if (x + cellSize > W) {
                    this.pos.x = 0;
                }
                if (y + cellSize > W) {
                    this.pos.y = 0;
                }
                if (y < 0) {
                    this.pos.y = H - cellSize;
                }
                if (x < 0) {
                    this.pos.x = W - cellSize;
                }
            }
            controlls() {
                let dir = this.size;
                if (KEY.ArrowUp) {
                    this.dir = new helpers.Vec(0, -dir);
                }
                if (KEY.ArrowDown) {
                    this.dir = new helpers.Vec(0, dir);
                }
                if (KEY.ArrowLeft) {
                    this.dir = new helpers.Vec(-dir, 0);
                }
                if (KEY.ArrowRight) {
                    this.dir = new helpers.Vec(dir, 0);
                }
            }
            selfCollision() {
                for (let i = 0; i < this.history.length; i++) {
                    let p = this.history[i];
                    if (helpers.isCollision(this.pos, p)) {
                        isGameOver = true;
                    }
                } 
            }
            update() {
                this.walls();
                this.draw();
                this.controlls();
                if (!this.delay--) {
                    if (helpers.isCollision(this.pos, food.pos)) {
                        incrementScore();
                        particleSplash();
                        food.spawn();
                        this.total++;
                    }
                    this.history[this.total - 1] = new helpers.Vec(this.pos.x, this.pos.y);
                    for (let i = 0; i < this.total - 1; i++) {
                        this.history[i] = this.history[i + 1];
                    } 
                    this.pos.add(this.dir);
                    this.delay = 5;
                    this.total > 3 ? this.selfCollision() : null;
                }
            }
        }

        class Food {
            constructor() {
                this.pos = new helpers.Vec(
                    ~~(Math.random() * cells) * cellSize,
                    ~~(Math.random() * cells) * cellSize);

                this.color = currentHue = `hsl(${~~(Math.random() * 360)},100%,50%)`;
                this.size = cellSize;
            }
            draw() {
                let { x, y } = this.pos;
                CTX.globalCompositeOperation = "lighter";
                CTX.shadowBlur = 20;
                CTX.shadowColor = this.color;
                CTX.fillStyle = this.color;
                CTX.fillRect(x, y, this.size, this.size);
                CTX.globalCompositeOperation = "source-over";
                CTX.shadowBlur = 0;
            }
            spawn() {
                let randX = ~~(Math.random() * cells) * this.size;
                let randY = ~~(Math.random() * cells) * this.size;
                for (let path of snake.history) {
                    if (helpers.isCollision(new helpers.Vec(randX, randY), path)) {
                        return this.spawn();
                    }
                }
                this.color = currentHue = `hsl(${helpers.randHue()}, 100%, 50%)`;
                this.pos = new helpers.Vec(randX, randY);
            }
        }

        class Particle {
            constructor(pos, color, size, vel) {
                this.pos = pos;
                this.color = color;
                this.size = Math.abs(size / 2);
                this.ttl = 0;
                this.gravity = -0.2;
                this.vel = vel;
            }
            draw() {
                let { x, y } = this.pos;
                let hsl = this.color.
                    split("").
                    filter(l => l.match(/[^hsl()$% ]/g)).
                    join("").
                    split(",").
                    map(n => +n);
                let [r, g, b] = helpers.hsl2rgb(hsl[0], hsl[1] / 100, hsl[2] / 100);
                CTX.shadowColor = `rgb(${r},${g},${b},${1})`;
                CTX.shadowBlur = 0;
                CTX.globalCompositeOperation = "lighter";
                CTX.fillStyle = `rgb(${r},${g},${b},${1})`;
                CTX.fillRect(x, y, this.size, this.size);
                CTX.globalCompositeOperation = "source-over";
            }
            update() {
                this.draw();
                this.size -= 0.3;
                this.ttl += 1;
                this.pos.add(this.vel);
                this.vel.y -= this.gravity;
            }
        }

        function incrementScore() {
            score++;
            dom_score.innerText = score.toString().padStart(3, "0");
        }

        function particleSplash() {
            for (let i = 0; i < splashingParticleCount; i++) {
                let vel = new helpers.Vec(Math.random() * 6 - 3, Math.random() * 6 - 3);
                let position = new helpers.Vec(food.pos.x, food.pos.y);
                particles.push(new Particle(position, currentHue, food.size, vel));
            } 
        }

        function clear() {
            CTX.clearRect(0, 0, W, H);
        }

        function initialize() {
            CTX.imageSmoothingEnabled = false;
            KEY.listen();
            cellsCount = cells * cells;
            cellSize = W / cells;
            snake = new Snake();
            food = new Food();
            dom_replay.addEventListener("click", reset, false);
            loop();
        }

        function loop() {
            clear();
            if (!isGameOver) {
                requestID = setTimeout(loop, 1000 / 60);
                helpers.drawGrid();
                snake.update();
                food.draw();
                for (let p of particles) {
                    p.update();
                }
                helpers.garbageCollector();
            } else {
                clear();
                gameOver();
            }
        }

        function gameOver() {
            let highscorecheck;
            maxScore ? null : maxScore = score;
            score > maxScore ? maxScore = score : null;
            window.localStorage.setItem("maxScore", maxScore);
            CTX.fillStyle = "#4cffd7";
            CTX.textAlign = "center";
            CTX.font = "bold 30px Poppins, sans-serif";
            CTX.fillText("GAME OVER", W / 2, H / 2);
            CTX.font = "15px Poppins, sans-serif";
            CTX.fillText(`SCORE   ${score}`, W / 2, H / 2 + 60);
            if (maxScore > 399) {
                highscore(maxScore).then(highscorecheck => {
                    if (highscorecheck !== 'Fail') {
                        CTX.fillText(highscorecheck, W / 2, H / 2 + 80);
                    } else {
                        CTX.fillText(`Error Reading High Score`, W / 2, H / 2 + 80);
                    }
                });
            } else {
                CTX.fillText(`MonSTA's Score - 399`, W / 2, H / 2 + 80);
            }
        }

        function highscore(playerscore) {
            const dataToSend = { score: playerscore };

            return fetch('./checkscore.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dataToSend)
            })
            .then(response => {
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response.json();
            })
            .then(data => {
                return data.value;
            })
            .catch(err => {
                console.error('Error:', err);
                return 'Fail';
            });
        }
        
        function reset() {
            dom_score.innerText = "000";
            score = "000";
            snake = new Snake();
            food.spawn();
            KEY.resetState();
            isGameOver = false;
            clearTimeout(requestID);
            loop();
        }

        initialize();
    </script>

<script src="./regl.min.js"></script>
<script src="./gl-matrix-min.js"></script>
<script src="./one-color-all.js"></script>
<script>
const onecolor = one.color;

function hex2vector(cssHex) {
  const pc = onecolor(cssHex);

  return vec3.fromValues(
  pc.red(),
  pc.green(),
  pc.blue());
}

const charW = 6;
const charH = 10;
const bufferCW = 80;
const bufferCH = 24;
const bufferW = bufferCW * charW;
const bufferH = bufferCH * charH;
const textureW = 512;
const textureH = 256;

const consolePad = 8; // in texels
const consoleW = bufferW + consolePad * 2;
const consoleH = bufferH + consolePad * 2;

const bufferCanvas = document.createElement('canvas');
bufferCanvas.width = bufferW;
bufferCanvas.height = bufferH;

const bufferContext = bufferCanvas.getContext('2d');

bufferContext.fillStyle = '#000';
bufferContext.fillRect(0, 0, bufferW, bufferH);

function charRange(start, end) {
  return Array.apply(null, new Array(end - start)).map((_, index) => {
    return String.fromCharCode(start + index);
  });
}

const characterSet = [].
concat(charRange(0x30, 0x3a)) // ASCII digits
.concat(charRange(0x40, 0x5b)) // ASCII uppercase and @
.concat(charRange(0x30a0, 0x30ff)) // kanji
;
const SEED_OFFSET = new Date().getTime();

function randomize(seed) {
  const intSeed = seed % 2147483647;
  const safeSeed = intSeed > 0 ? intSeed : intSeed + 2147483646;
  return safeSeed * 16807 % 2147483647;
}

function getRandomizedFraction(seed) {
  return (seed - 1) / 2147483646;
}

// main character trail state
function createTrail() {
  const cx = Math.floor(Math.random() * bufferCW);
  const cy = 0;
  const cvy = 5 + Math.random() * 15;

  return [cx, cy, cvy];
}

const trails = Array.apply(null, new Array(30)).map((_, index) => {
  return createTrail();
});

function updateWorld(delta) {
  trails.forEach((trail, index) => {
    trail[1] += trail[2] * delta;

    if (trail[1] > bufferCH) {
      trails[index] = createTrail();
    }
  });
}

// "warm up" the state by simulating the world for a bit
Array.apply(null, new Array(100)).forEach(() => {
  updateWorld(0.1);
});

let fadeCountdown = 0;
let bannerCountdown = 8.0;
let bannerChoice = 0;

function renderWorld(delta) {
  // fade screen every few frames
  // (not every frame, for long trails without rounding artifacts)
  fadeCountdown -= delta;

  if (fadeCountdown < 0) {
    bufferContext.fillStyle = 'rgba(0, 0, 0, 0.5)';
    bufferContext.fillRect(0, 0, bufferW, bufferH);

    fadeCountdown += 0.2;
  }

  // redraw
  bufferContext.textAlign = 'center';
  bufferContext.font = '12px "Inconsolata"';

  trails.forEach((trail, index) => {
    const k = index / trails.length;
    const charY = Math.floor(trail[1]);

    // randomize based on character position
    const charSeed = index + (trail[0] + charY * bufferCW) * 50;
    const outSeed = randomize(charSeed * 1500 + SEED_OFFSET);

    const char = characterSet[Math.floor(getRandomizedFraction(outSeed) * characterSet.length)];

    bufferContext.fillStyle = `hsl(${180 + k * 120}, 100%, 60%)`;
    bufferContext.fillText(
    char,
    (trail[0] + 0.5) * charW, // center inside character box
    charY * charH + charH,
    charW // restrict width, but allow a tiny bit of spillover
    );
  });

  if (bannerCountdown < 1.5) {
    bufferContext.fillStyle = `hsla(${180 + Math.random() * 220}, 100%, 30%, 1)`;
    bufferContext.fillRect(0, 0, bufferW, bufferH);
  }

  if (bannerCountdown < 0) {
    bannerCountdown += 10 + Math.random() * 10;
  }
}

// init WebGL
const htmlCanvas = document.getElementById("matrixcanvas");

// Match internal size to CSS-rendered size
htmlCanvas.width = htmlCanvas.clientWidth;
htmlCanvas.height = htmlCanvas.clientHeight;

const regl = createREGL({
  canvas: htmlCanvas,
//   canvas: document.body.querySelector('canvas'),
  attributes: { antialias: true, alpha: false, preserveDrawingBuffer: true } });

const spriteTexture = regl.texture({
  width: 512,
  height: 256,
  mag: 'linear' });

const termFgColor = hex2vector('#fee');
const termBgColor = hex2vector('#002a2a');

const quadCommand = regl({
  vert: `
        precision mediump float;

        attribute vec3 position;

        varying vec2 uvPosition;

        void main() {
            uvPosition = position.xy * vec2(0.5, -0.5) + vec2(0.5);

            gl_Position = vec4(
                vec2(-1.0, 1.0) + (position.xy - vec2(-1.0, 1.0)) * 1.0,
                0.0,
                1.0
            );
        }
    `,

  frag: `
        precision mediump float;

        varying vec2 uvPosition;
        uniform sampler2D sprite;
        uniform float time;
        uniform vec3 bgColor;
        uniform vec3 fgColor;

        #define textureW ${textureW + '.0'}
        #define textureH ${textureH + '.0'}
        #define consoleW ${consoleW + '.0'}
        #define consoleH ${consoleH + '.0'}
        #define consolePadUVW ${consolePad / consoleW}
        #define consolePadUVH ${consolePad / consoleH}
        #define charUVW ${charW / consoleW}
        #define charUVH ${charH / consoleH}

        void main() {
            // @todo use uniform
            vec2 consoleWH = vec2(consoleW, consoleH);

            // @todo use uniforms
            float glitchLine = mod(0.8 + time * 0.07, 1.0);
            float glitchFlutter = mod(time * 40.0, 1.0); // timed to be slightly out of sync from main frame rate
            float glitchAmount = 0.06 + glitchFlutter * 0.01;
            float glitchDistance = 0.04 + glitchFlutter * 0.15;

            vec2 center = uvPosition - vec2(0.5);
            float factor = dot(center, center) * 0.2;
            vec2 distortedUVPosition = uvPosition + center * (1.0 - factor) * factor;

            vec2 fromEdge = vec2(0.5, 0.5) - abs(distortedUVPosition - vec2(0.5, 0.5));

            if (fromEdge.x > 0.0 && fromEdge.y > 0.0) {
                vec2 fromEdgePixel = min(0.2 * consoleWH * fromEdge, vec2(1.0, 1.0));

                // simulate 2x virtual pixel size, for crisp display on low-res
                vec2 inTexel = mod(distortedUVPosition * consoleWH * 0.5, vec2(1.0));

                float distToGlitch = glitchLine - (distortedUVPosition.y - inTexel.y / consoleH);
                float glitchOffsetLinear = step(0.0, distToGlitch) * max(0.0, glitchDistance - distToGlitch) / glitchDistance;
                float glitchOffset = glitchOffsetLinear * glitchOffsetLinear;

                vec2 inTexelOffset = inTexel - 0.5;
                float scanlineAmount = inTexelOffset.y * inTexelOffset.y / 0.25;
                float intensity = 8.0 - scanlineAmount * 5.0 + glitchOffset * 2.0; // ray intensity is over-amped by default
                vec2 uvAdjustment = inTexelOffset * vec2(0.0, .5 / consoleH); // remove vertical texel interpolation

                distortedUVPosition.x -= glitchOffset * glitchAmount + 0.011 * (glitchFlutter * glitchFlutter * glitchFlutter);

                vec4 sourcePixel = texture2D(
                    sprite,
                    (distortedUVPosition - uvAdjustment) * consoleWH / vec2(textureW, textureH)
                );

                vec3 pixelRGB = sourcePixel.rgb * sourcePixel.a;

                // multiply by source alpha as well
                float screenFade = 1.0 - dot(center, center) * 1.8;
                float edgeFade = fromEdgePixel.x * fromEdgePixel.y;
                gl_FragColor = vec4(edgeFade * screenFade * mix(
                    bgColor,
                    fgColor,
                    intensity * pixelRGB + glitchOffset * 1.5
                ) * (1.0 - 0.2 * scanlineAmount), 0.2);
            } else {
                gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0);
            }
        }
    `,

  attributes: {
    position: regl.buffer([
    [-1, -1, 0],
    [1, -1, 0],
    [-1, 1, 0],
    [1, 1, 0]]) },

  uniforms: {
    time: regl.context('time'),
    camera: regl.prop('camera'),
    sprite: spriteTexture,
    bgColor: regl.prop('bgColor'),
    fgColor: regl.prop('fgColor') },

  primitive: 'triangle strip',
  count: 4,

  depth: {
    enable: false },

  blend: {
    enable: true,
    func: {
      src: 'src alpha',
      dst: 'one minus src alpha' } } });

regl.clear({
  depth: 1,
  color: [0, 0, 0, 1] });


// main loop
let currentTime = performance.now();

function rafBody() {
  // measure time
  const newTime = performance.now();
  const delta = Math.min(0.05, (newTime - currentTime) / 1000); // apply limiter to avoid frame skips
  currentTime = newTime;

  updateWorld(delta);
  renderWorld(delta);

  regl.poll();
  spriteTexture.subimage(bufferContext, consolePad, consolePad);
  quadCommand({
    bgColor: termBgColor,
    fgColor: termFgColor });


  requestAnimationFrame(rafBody);
}

// kickstart the loop
rafBody();

  </script>
